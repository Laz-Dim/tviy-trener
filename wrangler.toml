name = "tviy-trener"
compatibility_date = "2024-01-01"
pages_build_output_dir = "."

# Cloudflare Pages configuration
[build]
command = "echo 'Static site - no build needed'"
cwd = "."

# Custom domains (configure in Cloudflare dashboard after deployment)
# [[routes]]
# pattern = "tviy-trener.com/*"
# zone_name = "tviy-trener.com"

# Environment variables (set in Cloudflare dashboard)
# [env.production.vars]
# NODE_ENV = "production"

# KV namespace for OTP storage (create via: wrangler kv:namespace create "OTP_KV")
 [[kv_namespaces]]
 binding = "OTP_KV"
 id = "112a6b6f44ca43fe8863ed308172f231"
# preview_id = "your-preview-kv-namespace-id"

[assets]
directory = "."

# Workers functions are auto-discovered from functions/ directory
# Functions will be available at:
# /api/admin/send-code -> functions/admin/send-code.js
# /api/admin/verify-code -> functions/admin/verify-code.js